services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: movie_booking_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 10

  db:
    image: postgres:18
    container_name: movie_booking_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 200202
      POSTGRES_DB: movie_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d movie_booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: movie_booking_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:200202@db:5432/movie_booking
      APP_BASE_URL: http://localhost:8000
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    volumes:
      - ./app/tickets:/app/app/tickets

  worker:
    build: .
    container_name: movie_booking_worker
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=1
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:200202@db:5432/movie_booking
      APP_BASE_URL: http://localhost:8000
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./app/tickets:/app/app/tickets

  beat:
    build: .
    container_name: movie_booking_beat
    command: celery -A app.celery_app.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:200202@db:5432/movie_booking
      APP_BASE_URL: http://localhost:8000
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
